<ion-content>
  <!-- Header Profile Area -->
  <div class="profile-header">
    <ion-avatar>
      <img src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?auto=format&fit=crop&w=200&q=80"
        alt="Avatar" />
    </ion-avatar>
    <h2>{{ user?.name }}</h2>
    <p>Customer Account</p>
  </div>

  <!-- Menu List -->
  <ion-list class="menu-list ion-margin-bottom">
    <ion-item button detail="true">
      <ion-icon name="person-outline" slot="start" color="primary"></ion-icon>
      <ion-label>Personal Information</ion-label>
    </ion-item>
    <ion-item button detail="true" routerLink="/products">
      <ion-icon name="storefront-outline" slot="start" color="primary"></ion-icon>
      <ion-label>Browse Products</ion-label>
    </ion-item>
    <ion-item button detail="false" (click)="logout()" lines="none">
      <ion-icon name="log-out-outline" slot="start" color="danger"></ion-icon>
      <ion-label color="danger">Logout</ion-label>
    </ion-item>
  </ion-list>

  <div class="ion-padding-horizontal">
    <h3 class="section-title">My Orders</h3>

    <div *ngIf="orders.length === 0" class="ion-text-center ion-padding-vertical text-muted">
      <p>You have no orders yet.</p>
    </div>

    <!-- Order Cards -->
    <ion-card class="shadow-card order-card" *ngFor="let order of orders">
      <ion-card-content>
        <div class="order-header">
          <div>
            <h4>Order #{{ order.id }}</h4>
            <p class="order-date">{{ order.createdAt | date:'shortDate' }}</p>
          </div>
          <ion-badge [color]="getStatusColor(order.status)">{{ order.status }}</ion-badge>
        </div>
        <div class="order-details">
          <p>Total Items: {{ order.items?.length || 0 }}</p>
          <h3 class="ion-color-primary"><strong>{{ order.totalAmount | currency:'VND' }}</strong></h3>
        </div>
      </ion-card-content>
    </ion-card>
  </div>
</ion-content>
