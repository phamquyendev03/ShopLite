<ion-header class="ion-no-border">
  <ion-toolbar class="page-header-toolbar">
    <ion-title>Tài khoản</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="profile-content" [fullscreen]="true">
  <ion-refresher slot="fixed" (ionRefresh)="handleRefresh($event)">
    <ion-refresher-content pullingText="Kéo xuống để làm mới" refreshingText="Đang tải..."></ion-refresher-content>
  </ion-refresher>
  
  <div class="profile-header">
    <h2>{{ user?.name }}</h2>
  </div>

  <ion-list class="menu-list">
    <ion-item button detail="false" (click)="logout()" lines="none">
      <ion-icon name="log-out-outline" slot="start" color="danger"></ion-icon>
      <ion-label color="danger">Đăng xuất</ion-label>
    </ion-item>
  </ion-list>

  <div class="orders-section">
    <h3 class="section-title">Đơn hàng của tôi</h3>

    <div *ngIf="orders.length === 0" class="ion-text-center ion-padding-vertical text-muted">
      <p>Bạn chưa có đơn hàng nào.</p>
    </div>

    <ion-card class="shadow-card order-card" *ngFor="let order of orders">
      <ion-card-content>
        <div class="order-header">
          <div>
            <h4>Đơn #{{ order.id }}</h4>
            <p class="order-date">{{ order.createdAt | date:'shortDate' }}</p>
          </div>
          <ion-badge [color]="getStatusColor(order.status)">{{ order.status }}</ion-badge>
        </div>
        <div class="order-details">
          <p>Tổng món: {{ order.items.length || 0 }}</p>
          <h3 class="ion-color-primary"><strong>{{ order.totalAmount | currency:'VND' }}</strong></h3>
        </div>
      </ion-card-content>
    </ion-card>
  </div>
  <div style="height: 80px;"></div>
</ion-content>
