<ion-header class="ion-no-border">
  <ion-toolbar class="page-header-toolbar">
    <div style="display: flex; justify-content: space-between; align-items: center; padding-right: 8px;">
      <div class="greeting-box" style="padding-left: 8px;">
        <p style="margin: 0; color: var(--sl-text-sec); font-size: 14px; font-weight: 500;">Xin chào,</p>
        <h2 style="margin: 4px 0 0; color: var(--sl-text-main); font-size: 20px; font-weight: 700;">{{ userName }}</h2>
      </div>
    </div>
  </ion-toolbar>

  <ion-toolbar class="page-search-toolbar">
    <ion-searchbar class="custom-search-bar" searchIcon="search-outline" placeholder="Tìm kiếm sản phẩm, đơn hàng..." mode="md">
    </ion-searchbar>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="dashboard-content">
  <!-- Pull to refresh -->
  <ion-refresher slot="fixed" (ionRefresh)="handleRefresh($event)">
    <ion-refresher-content pullingText="Kéo xuống để làm mới" refreshingText="Đang tải..."></ion-refresher-content>
  </ion-refresher>

  <!-- Content -->
  <div class="content">
    <!-- Summary Card -->
    <div class="summary-card">
      <div class="summary-header">
        <span class="summary-title">Tổng doanh thu</span>
        <a class="summary-action" routerLink="/tabs/reports">
          Xem lãi lỗ
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="14" height="14">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
          </svg>
        </a>
      </div>

      <div class="main-amount">
        <ion-spinner *ngIf="loading" name="crescent" color="primary"></ion-spinner>
        <ng-container *ngIf="!loading">{{ totalRevenue | number:'1.0-0' }} đ</ng-container>
      </div>

      <div class="summary-stats">
        <div class="stat-item">
          <div class="stat-label">Số đơn</div>
          <div class="stat-value">
            <ion-spinner *ngIf="loading" name="dots"></ion-spinner>
            <ng-container *ngIf="!loading">{{ totalOrders }}</ng-container>
          </div>
        </div>
        <div class="stat-divider"></div>
        <div class="stat-item">
          <div class="stat-label">Lợi nhuận</div>
          <div class="stat-value success">
            <ion-spinner *ngIf="loading" name="dots"></ion-spinner>
            <ng-container *ngIf="!loading">{{ totalProfit | number:'1.0-0' }} đ</ng-container>
          </div>
        </div>
      </div>
    </div>

    <!-- Feature Grid -->
    <h3 class="section-title">Tính năng</h3>
    <div class="feature-grid">
      <div class="feature-item" routerLink="/tabs/pos">
        <div class="feature-icon-wrapper c-blue">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z">
            </path>
          </svg>
        </div>
        <span class="feature-label">Bán hàng</span>
      </div>

      <div class="feature-item" routerLink="/tabs/inventory">
        <div class="feature-icon-wrapper c-green">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4">
            </path>
          </svg>
        </div>
        <span class="feature-label">Sản phẩm</span>
      </div>

      <div class="feature-item">
        <div class="feature-icon-wrapper c-orange">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z">
            </path>
          </svg>
        </div>
        <span class="feature-label">Nhân viên</span>
      </div>

      <div class="feature-item">
        <div class="feature-icon-wrapper c-gray">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z">
            </path>
          </svg>
        </div>
        <span class="feature-label">Kho app</span>
      </div>
    </div>


  </div>
</ion-content>
