<ion-content color="light" fullscreen>
    <div class="screen-container">

        <!-- LOGIN VIEW -->
        <div class="view" [class.view-hidden-left]="currentView === 'register'" id="login-view">
            <div class="ambient-blob blob-1"></div>
            <div class="ambient-blob blob-2"></div>

            <div class="auth-header">
                <div class="logo-mark">S</div>
                <h1 class="title">Bắt đầu <br>bán hàng</h1>
                <p class="subtitle">Quản lý cửa hàng theo cách thông minh nhất với ShopLite.</p>
            </div>

            <div class="auth-content">
                <form (ngSubmit)="onLogin()">
                    <div class="input-group">
                        <label class="input-label">Số điện thoại / Tên đăng nhập</label>
                        <div class="input-wrapper">
                            <div class="input-icon">
                                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"
                                    xmlns="http://www.w3.org/2000/svg">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                                </svg>
                            </div>
                            <input type="text" class="input-field" placeholder="Nhập tài khoản" [(ngModel)]="username"
                                name="username" required>
                        </div>
                    </div>

                    <div class="input-group">
                        <label class="input-label">Mật khẩu</label>
                        <div class="input-wrapper">
                            <div class="input-icon">
                                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"
                                    xmlns="http://www.w3.org/2000/svg">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z">
                                    </path>
                                </svg>
                            </div>
                            <input [type]="showPasswordLogin ? 'text' : 'password'" class="input-field"
                                placeholder="Nhập mật khẩu" [(ngModel)]="password" name="password" required>
                            <button type="button" class="password-toggle"
                                (click)="showPasswordLogin = !showPasswordLogin">
                                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"
                                    xmlns="http://www.w3.org/2000/svg">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z">
                                    </path>
                                </svg>
                            </button>
                        </div>
                    </div>

                    <div class="forgot-password">
                        <a href="#">Quên mật khẩu?</a>
                    </div>

                    <button type="submit" class="btn btn-primary" [disabled]="loading || !username || !password">
                        <ng-container *ngIf="loading">
                            <svg class="spinner" fill="none" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor"
                                    stroke-width="4"></circle>
                                <path class="opacity-75" fill="currentColor"
                                    d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                                </path>
                            </svg>
                            <span style="margin-left: 8px;">Đang xử lý...</span>
                        </ng-container>
                        <ng-container *ngIf="!loading">
                            Đăng nhập
                        </ng-container>
                    </button>
                </form>
            </div>

            <div class="auth-footer">
                <p>Chưa có tài khoản? <a href="javascript:void(0)" (click)="toggleView('register')">Đăng ký ngay</a></p>
            </div>
        </div>

        <!-- REGISTER VIEW -->
        <div class="view" [class.view-hidden-right]="currentView === 'login'" id="register-view">
            <button class="nav-back" (click)="toggleView('login')">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
                </svg>
            </button>
            <div class="ambient-blob blob-1" style="background: linear-gradient(135deg, #A7F3D0, #DBEAFE);"></div>
            <div class="ambient-blob blob-2"
                style="background: linear-gradient(135deg, var(--primary-light), #E0E7FF);"></div>

            <div class="auth-header" style="padding-top: 100px;">
                <h1 class="title">Tạo cửa hàng</h1>
                <p class="subtitle">Đăng ký để trải nghiệm trọn vẹn.</p>
            </div>

            <div class="auth-content">
                <form (ngSubmit)="onRegister()">
                    <div class="input-group">
                        <label class="input-label">Số điện thoại</label>
                        <div class="input-wrapper">
                            <div class="input-icon">
                                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"
                                    xmlns="http://www.w3.org/2000/svg">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z">
                                    </path>
                                </svg>
                            </div>
                            <input type="tel" class="input-field" placeholder="Nhập số điện thoại"
                                [(ngModel)]="regPhone" name="regPhone" required>
                        </div>
                    </div>

                    <div class="input-group">
                        <label class="input-label">Mật khẩu</label>
                        <div class="input-wrapper">
                            <div class="input-icon">
                                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"
                                    xmlns="http://www.w3.org/2000/svg">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z">
                                    </path>
                                </svg>
                            </div>
                            <input [type]="showPasswordReg ? 'text' : 'password'" class="input-field"
                                placeholder="Tạo mật khẩu an toàn" [(ngModel)]="regPassword" name="regPassword"
                                required>
                            <button type="button" class="password-toggle" (click)="showPasswordReg = !showPasswordReg">
                                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"
                                    xmlns="http://www.w3.org/2000/svg">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z">
                                    </path>
                                </svg>
                            </button>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary" style="margin-top: 16px;"
                        [disabled]="loading || !regPhone || !regPassword">
                        <ng-container *ngIf="loading">
                            <svg class="spinner" fill="none" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor"
                                    stroke-width="4"></circle>
                                <path class="opacity-75" fill="currentColor"
                                    d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                                </path>
                            </svg>
                            <span style="margin-left: 8px;">Đang tạo...</span>
                        </ng-container>
                        <ng-container *ngIf="!loading">
                            Tạo tài khoản
                        </ng-container>
                    </button>
                </form>
            </div>

            <div class="auth-footer">
                <p>Đã có tài khoản? <a href="javascript:void(0)" (click)="toggleView('login')">Đăng nhập</a></p>
            </div>
        </div>

    </div>
</ion-content>
