<ion-header class="ion-no-border">
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/products"></ion-back-button>
    </ion-buttons>
    <ion-title>Giỏ hàng của bạn</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content color="light">
  
  <div *ngIf="cartItems.length === 0" class="ion-text-center empty-cart">
    <ion-icon name="cart-outline" color="medium"></ion-icon>
    <p>Your cart is empty.</p>
    <ion-button routerLink="/products" color="primary">Browse Products</ion-button>
  </div>

  <ion-list class="cart-list" *ngIf="cartItems.length > 0">
    <ion-item *ngFor="let item of cartItems" class="cart-item shadow-card" lines="none">
      <ion-thumbnail slot="start">
        <img [src]="item.image" [alt]="item.name" />
      </ion-thumbnail>

      <ion-label>
        <h3 class="item-name">{{ item.name }}</h3>
        <p class="item-price">{{ item.price | currency:'VND' }}</p>
        
        <div class="action-row">
          <div class="quantity-controls">
            <ion-button fill="clear" size="small" (click)="decreaseQuantity(item)">
              <ion-icon name="remove-outline" slot="icon-only"></ion-icon>
            </ion-button>
            <span class="qty-text">{{ item.quantity }}</span>
            <ion-button fill="clear" size="small" (click)="increaseQuantity(item)">
              <ion-icon name="add-outline" slot="icon-only"></ion-icon>
            </ion-button>
          </div>
          <ion-button fill="clear" color="medium" (click)="removeItem(item)">
            <ion-icon name="trash-outline" slot="icon-only"></ion-icon>
          </ion-button>
        </div>
      </ion-label>
    </ion-item>
  </ion-list>
  
</ion-content>

<ion-footer class="ion-no-border sticky-bottom-bar" *ngIf="cartItems.length > 0">
  <div class="summary-row">
    <p>Total Payment</p>
    <h2>{{ total | currency:'VND' }}</h2>
  </div>
  <ion-button expand="block" shape="round" color="primary" class="checkout-btn" (click)="checkout()">
    Proceed to Checkout
  </ion-button>
</ion-footer>
